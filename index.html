<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Anke's Box V3.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #FAFAFA;
            --card-bg: #FFFFFF;
            --primary-color: #1B5E20; /* Deep Forest Green */
            --text-color: #333333;
            --placeholder-color: #CCCCCC;
            --border-color: #F0F0F0;
            --danger-color: #F87171;
            --tag-bg: #E8F5E9; /* Light Green */
            --tag-text: #1B5E20; /* Deep Forest Green */
        }

        @keyframes flash {
            0% { background-color: var(--tag-bg); }
            100% { background-color: transparent; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            letter-spacing: 0.5px;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }

        .main-header {
            padding: 15px 20px 10px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg);
            flex-shrink: 0;
        }

        .search-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #search-box {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            background-color: var(--bg-color);
        }
        #search-box:focus { outline-color: var(--primary-color); }

        #select-button {
            margin-left: 10px;
            font-size: 14px; font-weight: 500; color: var(--primary-color);
            cursor: pointer; background: none; border: none; padding: 5px;
        }
        #select-button.active { color: var(--danger-color); }

        #common-tags-container {
            background-color: var(--card-bg);
            padding: 10px 20px;
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            flex-wrap: nowrap;
            gap: 10px;
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
        #common-tags-container::-webkit-scrollbar { display: none; } /* Chrome, Safari, Opera */

        .common-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: normal;
            background-color: var(--tag-bg);
            color: var(--tag-text);
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            flex-shrink: 0;
        }

        .input-area {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg);
            flex-shrink: 0;
        }
        
        #text-input {
            width: 100%; height: 80px; background: transparent; border: none; color: var(--text-color); font-size: 16px; resize: none;
        }
        #text-input:focus { outline: none; }
        #text-input.pasted {
            animation: flash 0.5s ease-out;
        }

        .preview-container { display: flex; overflow-x: auto; padding-bottom: 10px; }
        .thumbnail-wrapper { position: relative; margin-right: 10px; flex-shrink: 0; }
        .thumbnail { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .thumbnail-remove { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        .controls {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 10px;
        }
        .controls-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #image-input, #import-input { display: none; }
        .icon-btn {
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn svg {
            width: 26px;
            height: 26px;
            stroke: #999;
            stroke-width: 1.5;
            transition: stroke 0.2s;
        }
        .icon-btn:hover svg { stroke: var(--primary-color); }

        #save-button {
            background-color: var(--primary-color); color: white; border: none; padding: 10px 20px; font-size: 15px; font-weight: 500; border-radius: 8px; cursor: pointer;
        }

        #history {
            flex-grow: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 20px;
        }

        .history-item {
            position: relative; background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 15px;
            margin-bottom: 12px;
            display: flex; align-items: flex-start;
            cursor: pointer;
        }
        .history-item.selectable { cursor: pointer; }
        .history-item.selected { box-shadow: 0 0 0 2px var(--primary-color); }
        .history-item:last-child { border-bottom: none; }

        .select-checkbox { margin-right: 15px; margin-top: 5px; width: 18px; height: 18px; pointer-events: none; }
        .item-content { flex-grow: 1; min-width: 0; }
        .item-content p { margin: 0; white-space: pre-wrap; word-wrap: break-word; line-height: 1.6; }
        
        .note-text-display {
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }
        .note-text-display.collapsible {
            max-height: 88px; /* Approx 4 lines */
            position: relative;
        }
        .note-text-display.collapsible::after {
            content: '...全文';
            position: absolute;
            bottom: 0;
            right: 0;
            background: linear-gradient(to right, transparent, var(--card-bg) 20%);
            padding-left: 20px;
            font-weight: 500;
            color: var(--primary-color);
        }
        .note-text-display.expanded {
            max-height: 1000px; /* Large value to show all content */
        }
        .note-text-display.expanded::after {
            content: '';
        }

        .history-images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .history-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .timestamp { font-size: 12px; color: var(--placeholder-color); margin-top: 10px; }
        
        .tags-container {
            margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px;
        }
        .tag-pill {
            background-color: var(--tag-bg); color: var(--tag-text); padding: 3px 8px; border-radius: 10px; font-size: 12px; cursor: pointer;
        }

        .item-actions {
            position: absolute; top: 12px; right: 12px; display: flex; gap: 8px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 5px;
            z-index: 10;
        }
        .item-actions button { background: none; border: none; cursor: pointer; padding: 2px; }
        .item-actions svg { width: 18px; height: 18px; stroke: #555; }

        .management-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            background-color: var(--card-bg);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .management-area .btn {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }
        .btn-outline:hover {
            background-color: var(--tag-bg);
        }

        .btn-solid {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        .btn-solid:hover {
            opacity: 0.9;
        }

        .btn-grey-outline {
            background-color: transparent;
            border: 1px solid #ccc;
            color: #555;
        }
        .btn-grey-outline:hover {
            background-color: #f5f5f5;
        }

        .floating-actions {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; transition: bottom 0.3s ease-in-out;
            z-index: 100;
        }
        .floating-actions.visible { bottom: 20px; }
        .floating-actions button {
            border: none; border-radius: 8px; padding: 12px 25px; font-size: 14px; font-weight: 500; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #bulk-delete-button { background-color: var(--danger-color); color: white; }
        #export-selected-button { background-color: var(--primary-color); color: white; }

        /* Custom Modal */
        #custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none; /* Initially hidden */
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center;
            max-width: 80%;
        }
        #modal-text {
            font-size: 15px;
            color: var(--text-color);
            margin: 0 0 20px 0;
        }
        #modal-ok-btn {
            width: 100px;
        }

    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="search-container">
                <input type="text" id="search-box" placeholder="搜索或点击标签...">
                <button id="select-button">选择</button>
            </div>
        </header>
        <div id="common-tags-container"></div>

        <section class="input-area">
            <input type="hidden" id="editing-note-id">
            <textarea id="text-input" placeholder="记录此刻的灵感... #标签"></textarea>
            <div id="preview-container" class="preview-container"></div>
            <div class="controls">
                <div class="controls-left">
                    <label for="image-input" class="icon-btn">
                         <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.776 48.776 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" /></svg>
                    </label>
                    <input type="file" id="image-input" accept="image/*" multiple>
                    <button id="paste-icon-btn" class="icon-btn">
                        <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a2.25 2.25 0 01-2.25 2.25h-1.5a2.25 2.25 0 01-2.25-2.25v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" /></svg>
                    </button>
                </div>
                <button id="save-button">保 存</button>
            </div>
        </section>
        
        <main id="history"></main>

        <footer class="management-area">
            <button id="export-markdown-button" class="btn btn-solid">导出至 AI 分析 (Markdown)</button>
            <button id="export-json-button" class="btn btn-outline">备份系统数据 (JSON)</button>
            <button id="import-button" class="btn btn-grey-outline">导入数据</button>
            <input type="file" id="import-input" accept=".json" style="display: none;">
        </footer>

        <div id="floating-actions" class="floating-actions">
            <button id="export-selected-button">导出选中</button>
            <button id="bulk-delete-button">删除选中</button>
        </div>

        <div id="custom-modal">
            <div class="modal-content">
                <p id="modal-text"></p>
                <button id="modal-ok-btn" class="btn btn-solid">好</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
        }
        
        async function requestPersistence() {
            if (navigator.storage && navigator.storage.persist) {
                const isPersisted = await navigator.storage.persisted();
                if (!isPersisted) {
                    const result = await navigator.storage.persist();
                    console.log(`Storage persistence request result: ${result}`);
                }
            }
        }

        const dbName = "inspirationDB_v3_2", storeName = "notes", dbVersion = 1;
        let db, selectedFiles = [], editingNoteId = null, selectMode = false, selectedNotes = new Set();
        const tagRegex = /#([\p{L}\p{N}_]+)/gu;

        const ui = {
            textInput: document.getElementById('text-input'),
            imageInput: document.getElementById('image-input'),
            saveButton: document.getElementById('save-button'),
            history: document.getElementById('history'),
            previewContainer: document.getElementById('preview-container'),
            searchBox: document.getElementById('search-box'),
            selectButton: document.getElementById('select-button'),
            floatingActions: document.getElementById('floating-actions'),
            bulkDeleteButton: document.getElementById('bulk-delete-button'),
            exportSelectedButton: document.getElementById('export-selected-button'),
            importButton: document.getElementById('import-button'),
            importInput: document.getElementById('import-input'),
            exportJsonButton: document.getElementById('export-json-button'),
            exportMarkdownButton: document.getElementById('export-markdown-button'),
            commonTagsContainer: document.getElementById('common-tags-container'),
            pasteIconBtn: document.getElementById('paste-icon-btn'),
            customModal: document.getElementById('custom-modal'),
            modalText: document.getElementById('modal-text'),
            modalOkBtn: document.getElementById('modal-ok-btn'),
        };

        function showCustomModal(message) {
            ui.modalText.textContent = message;
            ui.customModal.style.display = 'flex';
        }

        function hideCustomModal() {
            ui.customModal.style.display = 'none';
        }

        function initDB() {
            const request = indexedDB.open(dbName, dbVersion);
            request.onerror = e => console.error("DB Error:", e.target.errorCode);
            request.onsuccess = e => {
                db = e.target.result;
                renderHistory();
                updateCommonTags();
            };
            request.onupgradeneeded = e => {
                const store = e.target.result.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                store.createIndex('timestamp', 'timestamp');
                store.createIndex('textContent', 'textContent');
            };
        }

        function parseTags(text) {
            if (!text) return [];
            return Array.from(text.matchAll(tagRegex)).map(match => match[1]);
        }

        async function updateCommonTags() {
            const allNotes = await getAllNotes();
            const tagCounts = {};
            allNotes.forEach(note => {
                parseTags(note.textContent).forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
            });
            const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).map(entry => entry[0]);
            ui.commonTagsContainer.innerHTML = sortedTags.map(tag => `<button class="common-tag" data-tag="${tag}">#${tag}</button>`).join('');
        }

        function renderHistory(filter = '') {
            ui.history.innerHTML = '';
            const tx = db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const cursorReq = store.index('timestamp').openCursor(null, 'prev');

            cursorReq.onsuccess = e => {
                const cursor = e.target.result;
                if (!cursor) return;
                
                const note = cursor.value;
                const tags = parseTags(note.textContent);
                const filterLower = filter.toLowerCase();
                
                const isTagMatch = filter.startsWith('#') && tags.includes(filter.substring(1));
                const isTextMatch = !filter.startsWith('#') && note.textContent.toLowerCase().includes(filterLower);

                if (filter && !isTagMatch && !isTextMatch) {
                    cursor.continue();
                    return;
                }

                const isSelected = selectedNotes.has(note.id);
                const item = document.createElement('div');
                item.className = `history-item ${selectMode ? 'selectable' : ''} ${isSelected ? 'selected' : ''}`;
                item.dataset.id = note.id;

                const fullText = note.textContent || '';
                const title = `<strong>${fullText.substring(0, 15)}</strong>`;
                const restOfText = fullText.substring(15);
                const finalText = title + restOfText;

                const isLong = fullText.length > 150 || fullText.split('\n').length > 4;
                const textDisplayClass = `note-text-display ${isLong ? 'collapsible' : ''}`;

                item.innerHTML = `
                    ${selectMode ? `<input type="checkbox" class="select-checkbox" ${isSelected ? 'checked' : ''}>` : ''}
                    <div class="item-content">
                        <div class="${textDisplayClass}">
                           <p>${finalText}</p>
                        </div>
                        ${note.imageDataSet?.length ? `<div class="history-images">${note.imageDataSet.map(url => `<img src="${url}" loading="lazy">`).join('')}</div>` : ''}
                        ${tags.length ? `<div class="tags-container">${tags.map(tag => `<span class="tag-pill" data-tag="${tag}">#${tag}</span>`).join('')}</div>` : ''}
                        <div class="timestamp">${new Date(note.timestamp).toLocaleString()}</div>
                    </div>
                    ${!selectMode ? `
                    <div class="item-actions">
                        <button class="edit-btn" title="编辑"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125"></path></svg></button>
                        <button class="delete-btn" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    </div>` : ''}
                `;
                ui.history.appendChild(item);
                cursor.continue();
            };
        }

        function saveNote() {
            const textContent = ui.textInput.value.trim();
            const imageDataSet = selectedFiles.map(f => f.url);
            if (!textContent && !imageDataSet.length) return;

            const tx = db.transaction(storeName, 'readwrite');
            const noteData = { textContent, imageDataSet, timestamp: new Date() };

            let request;
            if (editingNoteId) {
                noteData.id = editingNoteId;
                request = tx.objectStore(storeName).put(noteData);
            } else {
                request = tx.objectStore(storeName).add(noteData);
            }
            tx.oncomplete = () => { 
                clearInputs(); 
                renderHistory(ui.searchBox.value); 
                updateCommonTags();
            };
        }

        function editNote(id) {
            db.transaction(storeName, 'readonly').objectStore(storeName).get(id).onsuccess = e => {
                const note = e.target.result;
                ui.textInput.value = note.textContent;
                selectedFiles = (note.imageDataSet || []).map(url => ({ id: Math.random(), url }));
                renderPreviews();
                editingNoteId = id;
                ui.saveButton.textContent = '更 新';
                ui.textInput.focus();
                window.scrollTo(0, 0);
            };
        }
        
        function clearInputs() {
            ui.textInput.value = '';
            selectedFiles = [];
            editingNoteId = null;
            renderPreviews();
            ui.saveButton.textContent = '保 存';
        }

        function renderPreviews() {
            ui.previewContainer.innerHTML = selectedFiles.map(f => `
                <div class="thumbnail-wrapper">
                    <img src="${f.url}" class="thumbnail">
                    <button class="thumbnail-remove" data-id="${f.id}">×</button>
                </div>`).join('');
        }
        
        function toggleSelectMode() {
            selectMode = !selectMode;
            ui.selectButton.textContent = selectMode ? '取消' : '选择';
            ui.selectButton.classList.toggle('active');
            if (!selectMode) {
                selectedNotes.clear();
                ui.floatingActions.classList.remove('visible');
            }
            renderHistory(ui.searchBox.value);
        }

        function updateFloatingActions() {
            const count = selectedNotes.size;
            if (count > 0) {
                ui.bulkDeleteButton.textContent = `删除选中 (${count}条)`;
                ui.floatingActions.classList.add('visible');
            } else {
                ui.floatingActions.classList.remove('visible');
            }
        }

        function bulkDelete() {
            const tx = db.transaction(storeName, 'readwrite');
            selectedNotes.forEach(id => tx.objectStore(storeName).delete(id));
            tx.oncomplete = () => {
                selectedNotes.clear();
                toggleSelectMode();
            }
        }

        function forceDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function exportData(idsToExport) {
            let notesToExport;
            if (idsToExport && idsToExport.size > 0) {
                notesToExport = await Promise.all(Array.from(idsToExport).map(id => getNoteById(id)));
            } else {
                notesToExport = await getAllNotes();
            }
            
            const data = JSON.stringify(notesToExport.filter(Boolean), null, 2);
            const blob = new Blob([data], {type: 'application/octet-stream'});
            const today = new Date().toISOString().slice(0, 10);
            forceDownload(blob, `Anke_Notes_${today}.json`);
        }

        function formatTimestampForMarkdown(date) {
            const d = new Date(date);
            const YYYY = d.getFullYear();
            const MM = String(d.getMonth() + 1).padStart(2, '0');
            const DD = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${YYYY}-${MM}-${DD} ${hh}:${mm}`;
        }

        async function exportToMarkdown() {
            if (!confirm('将导出纯文本格式（不包含图片）供 AI 或文档编辑器使用。是否确认？')) {
                return;
            }

            const allNotes = await getAllNotes();
            allNotes.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            let markdownContent = '# Anke\'s Box 灵感库导出\n\n';
            for (const note of allNotes) {
                const formattedTime = formatTimestampForMarkdown(note.timestamp);
                markdownContent += `## 📅 ${formattedTime}\n\n`;

                if (note.textContent) {
                    markdownContent += `${note.textContent}\n\n`;
                }

                if (note.imageDataSet && note.imageDataSet.length > 0) {
                    markdownContent += `[此处包含图片，请回到 Anke's Box 查看原图]\n\n`;
                }

                markdownContent += `---\n\n`;
            }

            const blob = new Blob([markdownContent], { type: 'application/octet-stream' });
            const today = new Date().toISOString().slice(0, 10);
            forceDownload(blob, `Anke_Notes_${today}.md`);
        }

        function importData(event) {
            if (!confirm('这会导入文件中的所有笔记，确定吗？')) {
                event.target.value = ''; 
                return;
            }
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    const tx = db.transaction(storeName, 'readwrite');
                    data.forEach(note => { if (note.id) delete note.id; tx.objectStore(storeName).add(note); });
                    tx.oncomplete = () => { renderHistory(); updateCommonTags(); alert('导入成功！'); };
                } catch (err) { alert('导入失败: 无效的JSON文件。'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        const getNoteById = id => new Promise(res => db.transaction(storeName).objectStore(storeName).get(id).onsuccess = e => res(e.target.result));
        const getAllNotes = () => new Promise(res => db.transaction(storeName).objectStore(storeName).getAll().onsuccess = e => res(e.target.result));

        // --- Event Listeners ---
        
        ui.saveButton.addEventListener('click', saveNote);
        
        ui.imageInput.addEventListener('change', e => {
             if (e.target.files.length + selectedFiles.length > 5) { 
                alert("最多5张图片"); 
                return; 
            }
            for(const file of e.target.files) {
                const reader = new FileReader();
                reader.onload = r_e => {
                    selectedFiles.push({ id: Math.random(), url: r_e.target.result });
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        ui.pasteIconBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    const { selectionStart, selectionEnd, value } = ui.textInput;
                    const newText = value.substring(0, selectionStart) + text + value.substring(selectionEnd);
                    ui.textInput.value = newText;
                    ui.textInput.focus();
                    ui.textInput.selectionEnd = selectionStart + text.length;

                    ui.textInput.classList.add('pasted');
                    setTimeout(() => ui.textInput.classList.remove('pasted'), 500);
                }
            } catch (err) {
                console.error('Failed to read clipboard contents: ', err);
                showCustomModal('无法从剪贴板读取内容。请检查浏览器权限设置。');
            }
        });

        ui.modalOkBtn.addEventListener('click', hideCustomModal);

        ui.previewContainer.addEventListener('click', e => {
            if (e.target.classList.contains('thumbnail-remove')) {
                selectedFiles = selectedFiles.filter(f => f.id !== parseFloat(e.target.dataset.id));
                renderPreviews();
            }
        });

        ui.history.addEventListener('click', e => {
            const item = e.target.closest('.history-item');
            if (!item) return;

            const id = parseInt(item.dataset.id);
            const isAction = e.target.closest('.item-actions');
            const isTag = e.target.classList.contains('tag-pill');

            if (selectMode) {
                if (selectedNotes.has(id)) selectedNotes.delete(id); else selectedNotes.add(id);
                item.classList.toggle('selected');
                const checkbox = item.querySelector('.select-checkbox');
                if(checkbox) checkbox.checked = selectedNotes.has(id);
                updateFloatingActions();
                return;
            }

            if(isTag) {
                const tag = e.target.dataset.tag;
                ui.searchBox.value = `#${tag}`;
                renderHistory(ui.searchBox.value);
                return;
            }

            if(isAction) {
                if (e.target.closest('.edit-btn')) {
                    editNote(id);
                } else if (e.target.closest('.delete-btn')) {
                    if (confirm('确认删除这条记录吗?')) {
                        db.transaction(storeName, 'readwrite').objectStore(storeName).delete(id).onsuccess = () => {
                            renderHistory(ui.searchBox.value); updateCommonTags();
                        }
                    }
                }
                return;
            }

            const textDisplay = item.querySelector('.note-text-display');
            if (textDisplay && textDisplay.classList.contains('collapsible')) {
                textDisplay.classList.toggle('expanded');
            }
        });
        ui.searchBox.addEventListener('input', () => renderHistory(ui.searchBox.value));
        ui.selectButton.addEventListener('click', toggleSelectMode);
        ui.bulkDeleteButton.addEventListener('click', () => { if(confirm(`确认删除选中的 ${selectedNotes.size} 条记录吗?`)) bulkDelete() });
        ui.exportSelectedButton.addEventListener('click', () => {
             if (confirm('这将备份选中的笔记为一个 JSON 文件。是否确认？')) {
                exportData(selectedNotes);
             }
        });
        
        ui.exportJsonButton.addEventListener('click', () => {
            if (confirm('这将备份所有笔记为一个 JSON 文件。是否确认？')) {
                exportData();
            }
        });
        ui.exportMarkdownButton.addEventListener('click', exportToMarkdown);

        ui.importButton.addEventListener('click', () => ui.importInput.click());
        ui.importInput.addEventListener('change', importData);
        ui.commonTagsContainer.addEventListener('click', e => {
            if(e.target.classList.contains('common-tag')) {
                const tag = e.target.dataset.tag;
                const newFilter = `#${tag}`;
                if (ui.searchBox.value === newFilter) {
                    ui.searchBox.value = '';
                } else {
                    ui.searchBox.value = newFilter;
                }
                renderHistory(ui.searchBox.value);
            }
        });

        window.onload = () => {
            initDB();
            requestPersistence();
        };
    </script>
</body>
</html>
